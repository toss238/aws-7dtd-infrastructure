AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  ProjectName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Default: "/home-lab/dev/common/project-name"

  GameName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Default: "/home-lab/dev/common/game-name/7dtd"

  Env:
    Type: String
    Default: "dev"

  KeyName:
    Type: "AWS::SSM::Parameter::Value<String>"
    Description: SSH KeyPair name
    Default: "/home-lab/dev/bastion/key-name"

  BastionInstanceType:
    Type: String
    Default: t3.micro

  BastionServerPrivateIp:
    Type: String
    Default: "10.0.1.10"

  GameServerPrivateIp:
    Type: String
    Default: "10.0.101.10"

Resources:
  BastionSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub Security Group for ${ProjectName}-${Env}-bastion
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-${Env}-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 26900
          ToPort: 26900
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 26900
          ToPort: 26903
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Env}-bastion-sg

  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref BastionInstanceType
      KeyName: !Ref KeyName
      ImageId: "{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}"
      SubnetId: !ImportValue
        Fn::Sub: ${ProjectName}-${Env}-PublicSubnetId
      SecurityGroupIds:
        - !Ref BastionSG
      PrivateIpAddress: !Ref BastionServerPrivateIp
      SourceDestCheck: false 
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Env}-bastion
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            sysctl -w net.ipv4.ip_forward=1
            echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
            IFACE=$(ip route | grep default | awk '{print $5}')
            iptables -t nat -A POSTROUTING -o $IFACE -j MASQUERADE
            iptables -t nat -A PREROUTING -p tcp --dport 26900 -j DNAT --to-destination ${GameServerPrivateIp}:26900
            iptables -t nat -A PREROUTING -p udp --dport 26900:26903 -j DNAT --to-destination ${GameServerPrivateIp}:26900-26902

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !ImportValue
        Fn::Sub: ${GameName}-${Env}-PrivateRouteTableId
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref BastionInstance

  BastionEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Env}-bastion-eip

  BastionEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt BastionEIP.AllocationId
      InstanceId: !Ref BastionInstance

Outputs:
  BastionPublicIp:
    Description: Public IP of the Bastion instance
    Value: !Ref BastionEIP
